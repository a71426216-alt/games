<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐍 지렁이 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .game-wrapper {
            text-align: center;
        }

        h1 {
            color: #00ff88;
            font-size: 2.2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            letter-spacing: 3px;
        }

        .score-board {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 12px;
        }

        .score-item {
            color: #fff;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.08);
            padding: 6px 22px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .score-item span {
            color: #ffcc00;
            font-weight: bold;
            font-size: 1.3rem;
        }

        canvas {
            border: 2px solid #00ff88;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.2), inset 0 0 60px rgba(0,0,0,0.3);
            background: #111133;
            display: block;
            margin: 0 auto;
        }

        .controls-info {
            color: rgba(255,255,255,0.5);
            margin-top: 14px;
            font-size: 0.9rem;
        }

        .controls-info kbd {
            background: rgba(255,255,255,0.12);
            padding: 3px 10px;
            border-radius: 5px;
            border: 1px solid rgba(255,255,255,0.2);
            font-family: inherit;
            color: #fff;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .overlay.active { pointer-events: all; }

        .overlay-content {
            background: rgba(10, 10, 46, 0.95);
            border: 2px solid #00ff88;
            border-radius: 16px;
            padding: 40px 50px;
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 255, 136, 0.3);
            transform: scale(0);
            transition: transform 0.3s ease;
        }

        .overlay.active .overlay-content {
            transform: scale(1);
        }

        .overlay h2 {
            color: #00ff88;
            font-size: 2rem;
            margin-bottom: 10px;
        }

        .overlay p {
            color: #ccc;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .overlay .final-score {
            color: #ffcc00;
            font-size: 2.5rem;
            font-weight: bold;
            margin: 15px 0;
        }

        .btn {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0a2e;
            border: none;
            padding: 12px 36px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 15px;
            transition: transform 0.15s, box-shadow 0.15s;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.5);
        }

        .mobile-controls {
            display: none;
            margin-top: 16px;
            gap: 6px;
        }

        .mobile-controls button {
            width: 60px;
            height: 60px;
            font-size: 1.6rem;
            background: rgba(0, 255, 136, 0.15);
            color: #00ff88;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.1s;
        }

        .mobile-controls button:active {
            background: rgba(0, 255, 136, 0.4);
        }

        .d-pad {
            display: grid;
            grid-template-areas:
                ".  up  ."
                "left . right"
                ".  down .";
            gap: 6px;
        }

        .d-pad .up    { grid-area: up; }
        .d-pad .down  { grid-area: down; }
        .d-pad .left  { grid-area: left; }
        .d-pad .right { grid-area: right; }

        @media (max-width: 600px) {
            h1 { font-size: 1.5rem; }
            .mobile-controls { display: block; }
            .controls-info { display: none; }
        }
    </style>
</head>
<body>

<div class="game-wrapper">
    <h1>🐍 지렁이 게임</h1>
    <div class="score-board">
        <div class="score-item">점수 <span id="score">0</span></div>
        <div class="score-item">최고 <span id="highScore">0</span></div>
        <div class="score-item">레벨 <span id="level">1</span></div>
    </div>
    <div style="position:relative; display:inline-block;">
        <canvas id="gameCanvas"></canvas>
        <div class="overlay active" id="startOverlay">
            <div class="overlay-content">
                <h2>🐍 지렁이 게임</h2>
                <p>먹이를 먹고 지렁이를 키워보세요!</p>
                <p style="font-size:0.9rem; color:#888;">벽이나 자기 몸에 닿으면 게임 오버</p>
                <button class="btn" id="startBtn">게임 시작</button>
            </div>
        </div>
        <div class="overlay" id="gameOverOverlay">
            <div class="overlay-content">
                <h2>💀 게임 오버</h2>
                <p>최종 점수</p>
                <div class="final-score" id="finalScore">0</div>
                <p id="newHighMsg" style="color:#ffcc00; display:none;">🎉 새로운 최고 기록!</p>
                <button class="btn" id="restartBtn">다시 하기</button>
            </div>
        </div>
    </div>
    <div class="controls-info">
        <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 또는 <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 로 이동 &nbsp;|&nbsp; <kbd>P</kbd> 일시정지
    </div>
    <div class="mobile-controls">
        <div class="d-pad">
            <button class="up" onclick="setDir(0,-1)">▲</button>
            <button class="left" onclick="setDir(-1,0)">◀</button>
            <button class="right" onclick="setDir(1,0)">▶</button>
            <button class="down" onclick="setDir(0,1)">▼</button>
        </div>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const CELL = 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

let snake, dir, nextDir, food, specialFood, score, highScore, level, speed, gameLoop, paused, particles;

highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
document.getElementById('highScore').textContent = highScore;

function init() {
    const midX = Math.floor(COLS / 2);
    const midY = Math.floor(ROWS / 2);
    snake = [
        { x: midX, y: midY },
        { x: midX - 1, y: midY },
        { x: midX - 2, y: midY }
    ];
    dir = { x: 1, y: 0 };
    nextDir = { x: 1, y: 0 };
    score = 0;
    level = 1;
    speed = 120;
    paused = false;
    particles = [];
    specialFood = null;
    updateUI();
    placeFood();
}

function placeFood() {
    let pos;
    do {
        pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = pos;

    if (score > 0 && score % 5 === 0 && !specialFood) {
        let sPos;
        do {
            sPos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
        } while (snake.some(s => s.x === sPos.x && s.y === sPos.y) || (sPos.x === food.x && sPos.y === food.y));
        specialFood = { ...sPos, timer: 80 };
    }
}

function updateUI() {
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('highScore').textContent = highScore;
}

function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
        particles.push({
            x: x * CELL + CELL / 2,
            y: y * CELL + CELL / 2,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6,
            life: 20 + Math.random() * 15,
            color: color,
            size: 2 + Math.random() * 3
        });
    }
}

function update() {
    if (paused) return;

    dir = { ...nextDir };
    const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

    if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
    if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

    snake.unshift(head);

    let ate = false;
    if (head.x === food.x && head.y === food.y) {
        score++;
        ate = true;
        spawnParticles(food.x, food.y, '#ff4444', 10);
        placeFood();
        if (score % 5 === 0) {
            level++;
            speed = Math.max(50, speed - 10);
            clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }
        updateUI();
    } else {
        snake.pop();
    }

    if (specialFood) {
        if (head.x === specialFood.x && head.y === specialFood.y) {
            score += 3;
            spawnParticles(specialFood.x, specialFood.y, '#ff00ff', 15);
            specialFood = null;
            updateUI();
        } else {
            specialFood.timer--;
            if (specialFood.timer <= 0) specialFood = null;
        }
    }

    particles.forEach(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life--;
        p.vx *= 0.95;
        p.vy *= 0.95;
    });
    particles = particles.filter(p => p.life > 0);

    draw();
}

function draw() {
    ctx.fillStyle = '#111133';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= COLS; i++) {
        ctx.beginPath();
        ctx.moveTo(i * CELL, 0);
        ctx.lineTo(i * CELL, canvas.height);
        ctx.stroke();
    }
    for (let i = 0; i <= ROWS; i++) {
        ctx.beginPath();
        ctx.moveTo(0, i * CELL);
        ctx.lineTo(canvas.width, i * CELL);
        ctx.stroke();
    }

    snake.forEach((seg, i) => {
        const ratio = 1 - (i / snake.length) * 0.6;
        if (i === 0) {
            ctx.fillStyle = '#00ff88';
            ctx.shadowColor = '#00ff88';
            ctx.shadowBlur = 12;
        } else {
            const g = Math.floor(180 * ratio);
            const b = Math.floor(60 * ratio);
            ctx.fillStyle = `rgb(0, ${g}, ${b})`;
            ctx.shadowBlur = 0;
        }
        const padding = i === 0 ? 1 : 2;
        ctx.beginPath();
        ctx.roundRect(seg.x * CELL + padding, seg.y * CELL + padding, CELL - padding * 2, CELL - padding * 2, 4);
        ctx.fill();
    });
    ctx.shadowBlur = 0;

    if (snake.length > 0) {
        const h = snake[0];
        ctx.fillStyle = '#003322';
        const eyeSize = 3;
        let e1x, e1y, e2x, e2y;
        if (dir.x === 1) { e1x = h.x * CELL + 14; e1y = h.y * CELL + 6; e2x = h.x * CELL + 14; e2y = h.y * CELL + 14; }
        else if (dir.x === -1) { e1x = h.x * CELL + 6; e1y = h.y * CELL + 6; e2x = h.x * CELL + 6; e2y = h.y * CELL + 14; }
        else if (dir.y === -1) { e1x = h.x * CELL + 6; e1y = h.y * CELL + 6; e2x = h.x * CELL + 14; e2y = h.y * CELL + 6; }
        else { e1x = h.x * CELL + 6; e1y = h.y * CELL + 14; e2x = h.x * CELL + 14; e2y = h.y * CELL + 14; }
        ctx.beginPath(); ctx.arc(e1x, e1y, eyeSize, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(e2x, e2y, eyeSize, 0, Math.PI * 2); ctx.fill();
    }

    ctx.shadowColor = '#ff4444';
    ctx.shadowBlur = 15;
    ctx.fillStyle = '#ff4444';
    ctx.beginPath();
    ctx.arc(food.x * CELL + CELL / 2, food.y * CELL + CELL / 2, CELL / 2 - 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '10px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('●', food.x * CELL + CELL / 2, food.y * CELL + CELL / 2 + 3);

    if (specialFood) {
        const pulse = 0.8 + Math.sin(Date.now() / 100) * 0.2;
        ctx.shadowColor = '#ff00ff';
        ctx.shadowBlur = 20;
        ctx.fillStyle = `rgba(255, 0, 255, ${pulse})`;
        ctx.beginPath();
        ctx.arc(specialFood.x * CELL + CELL / 2, specialFood.y * CELL + CELL / 2, CELL / 2 - 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#fff';
        ctx.font = 'bold 11px sans-serif';
        ctx.fillText('★', specialFood.x * CELL + CELL / 2, specialFood.y * CELL + CELL / 2 + 4);
    }

    particles.forEach(p => {
        ctx.globalAlpha = p.life / 35;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });
    ctx.globalAlpha = 1;

    if (paused) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#00ff88';
        ctx.font = 'bold 32px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('⏸ 일시정지', canvas.width / 2, canvas.height / 2);
        ctx.font = '16px sans-serif';
        ctx.fillStyle = '#aaa';
        ctx.fillText('P 키를 눌러 계속하기', canvas.width / 2, canvas.height / 2 + 30);
    }
}

function gameOver() {
    clearInterval(gameLoop);
    gameLoop = null;
    const isNew = score > highScore;
    if (isNew) {
        highScore = score;
        localStorage.setItem('snakeHighScore', highScore);
        updateUI();
    }
    document.getElementById('finalScore').textContent = score;
    document.getElementById('newHighMsg').style.display = isNew ? 'block' : 'none';
    document.getElementById('gameOverOverlay').classList.add('active');
}

function startGame() {
    document.getElementById('startOverlay').classList.remove('active');
    document.getElementById('gameOverOverlay').classList.remove('active');
    init();
    draw();
    gameLoop = setInterval(update, speed);
}

function setDir(x, y) {
    if (x === -dir.x && y === 0 && dir.x !== 0) return;
    if (y === -dir.y && x === 0 && dir.y !== 0) return;
    nextDir = { x, y };
}

document.addEventListener('keydown', e => {
    switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); setDir(0, -1); break;
        case 'ArrowDown':  case 's': case 'S': e.preventDefault(); setDir(0, 1);  break;
        case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); setDir(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': e.preventDefault(); setDir(1, 0);  break;
        case 'p': case 'P':
            if (gameLoop) { paused = !paused; draw(); }
            break;
    }
});

let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

init();
draw();
</script>

</body>
</html>
