<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>눈을 뜬 날 — 김한결의 생존 기록</title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: #161a20;
      --text: #e8e6e3;
      --muted: #9aa3ad;
      --accent: #c45c3e;
      --accent2: #3d7a5c;
      --danger: #8b2c2c;
      --font: "Pretendard", "Malgun Gothic", system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(ellipse at top, #1a2229 0%, var(--bg) 55%);
      color: var(--text);
      font-family: var(--font);
      line-height: 1.65;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 1.5rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin: 0 0 0.25rem;
      color: #f0ebe5;
    }
    .sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.5rem;
    }
    #story {
      background: var(--panel);
      border: 1px solid #2a323c;
      border-radius: 12px;
      padding: 1.25rem 1.35rem;
      min-height: 220px;
      box-shadow: 0 8px 32px rgba(0,0,0,.35);
    }
    #story p {
      margin: 0 0 1rem;
      font-size: 0.95rem;
    }
    #story p:last-child { margin-bottom: 0; }
    .speaker {
      color: #b8c4d0;
      font-weight: 600;
    }
    .mono { color: #7a8fa3; font-style: italic; }
    #choices {
      margin-top: 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.65rem;
    }
    button.choice {
      font-family: inherit;
      font-size: 0.92rem;
      text-align: left;
      padding: 0.85rem 1rem;
      border-radius: 10px;
      border: 1px solid #3a4552;
      background: #1e252e;
      color: var(--text);
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    button.choice:hover {
      border-color: var(--accent);
      background: #252d38;
    }
    button.choice:focus {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .ending-tag {
      display: inline-block;
      margin-top: 0.75rem;
      padding: 0.35rem 0.65rem;
      border-radius: 6px;
      font-size: 0.78rem;
      font-weight: 600;
      background: var(--danger);
      color: #fff;
    }
    .ending-tag.good { background: var(--accent2); }
    .ending-tag.neutral { background: #5c5a42; }
    footer {
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }
    button.restart {
      margin-top: 1rem;
      width: 100%;
      padding: 0.75rem;
      border-radius: 10px;
      border: 1px dashed #4a5563;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
    }
    button.restart:hover { color: var(--text); border-color: var(--muted); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>눈을 뜬 날</h1>
    <p class="sub">좀비 아포칼립스 · 텍스트 선택 게임 · 엔딩 분기</p>
    <div id="story"></div>
    <div id="choices"></div>
    <footer>김한결의 시점 · 저장 없음 · 처음부터 다시 플레이해 다른 동료를 선택해 보세요.</footer>
  </div>
  <script>
    const storyEl = document.getElementById("story");
    const choicesEl = document.getElementById("choices");

    const scenes = {
      start: {
        html: `
          <p class="mono">머리가 깨질 듯이 아프다. 눈을 뜨자 천장이 흔들리는 듯 보였다.</p>
          <p><span class="speaker">김한결 (독백)</span> 여긴… 어디지? 공기가 쇠와 흙 냄새가 섞여 있다.</p>
          <p>낡은 천막 안이다. 밖에서는 누군가 발을 구르는 소리, 멀리서 희미한 무전기 잡음이 들린다.</p>
          <p><span class="speaker">홍성두</span> 이제야 정신이 드나 보네. 너 이틀 동안 잠만 잔 거 알아? 약 먹이느라 죽는 줄 알았다.</p>
          <p>중년 남자가 천막 입구를 반쯤 열고 서 있다. 얼굴에는 상처 자국이, 손에는 반창고가 덕지덕지 붙어 있다.</p>
          <p><span class="speaker">김한결</span> 내 이름은… 기억이 나는데. 도대체 여긴 어디야? 나 왜 여기 있지?</p>
          <p><span class="speaker">홍성두</span> 여긴 ‘남문 교외 임시 거점’. 좀비가 도시를 집어삼킨 뒤로 생존자들이 모인 곳이야. 너는 북쪽 고가도로에서 쓰러져 있었지. 우리가 끌어왔어.</p>
        `,
        choices: [
          { text: "“고마워… 그런데 나, 왜 거기 있었지?” 기억을 더 캐본다.", next: "memory" },
          { text: "“지금 상황부터 알려줘. 밖은 안전해?” 현실부터 파악한다.", next: "situation" },
          { text: "천막을 밀고 나가 사람들을 직접 본다.", next: "outside" },
        ],
      },
      memory: {
        html: `
          <p><span class="speaker">홍성두</span> 기억이 끊긴 건 아마 충격이겠지. 네 옆에 있던 차가 뒤집혀 있었어. 운전석은 텅 비었고.</p>
          <p><span class="speaker">김한결</span> …차?</p>
          <p><span class="speaker">홍성두</span> 응. 누군가 널 버리고 간 것 같기도 하고, 아니면 네가 필사적으로 탈출한 것 같기도 하고. 의무 김주연이 네 몸을 더 봐야 할 거야.</p>
          <p>그때 천막 밖에서 낮은 목소리가 끼어든다.</p>
          <p><span class="speaker">김주연 (의무)</span> 홍 대장, 무전 들어와요. 장현성 씨가 ‘북쪽’에서 이상 신호 잡았대요.</p>
        `,
        choices: [
          { text: "김주연과 함께 의무 텐트로 가 상처를 점검받는다.", next: "medic_tent" },
          { text: "장현성이 있는 통신소로 간다. 신호가 뭔지 듣는다.", next: "radio" },
        ],
      },
      situation: {
        html: `
          <p><span class="speaker">홍성두</span> 안전하다고 말하긴 어렵다. 밤에는 울음 같은 소리가 성벽 밖에서 들리고, 낮에도 가끔 ‘떼’가 몰려와.</p>
          <p><span class="speaker">홍성두</span> 다행히 여긴 최현준 같은 정찰병들이 길을 막아주고, 김경훈이 만든 장애물 덕에 버티는 중이야.</p>
          <p>밖에서 굉음이 난다. 누군가 소리친다.</p>
          <p><span class="speaker">박승호 (방어조)</span> 동쪽 펜스! 압력 올라왔어! 맹주훈, 지게차 위치!</p>
        `,
        choices: [
          { text: "동쪽 펜스로 달려가 상황을 본다.", next: "fence" },
          { text: "일단 홍성두를 따라 지휘소로 간다.", next: "command" },
        ],
      },
      outside: {
        html: `
          <p>천막 밖은 좁은 골목 같은 통로다. 비닐하우스를 개조한 창고들이 줄지어 있고, 사람들이 각자 일을 하고 있다.</p>
          <p><span class="speaker">김승욱 (급양)</span> 야, 방금 깬 사람 나와? 국물이라도 한 사발 먹어. 빈속에 약만 먹으면 쓰러진다.</p>
          <p><span class="speaker">문종범 (기록관)</span> 신입은 여기 서명부터. 이름, 특기, 왼쪽 손가락 지문… 농담이야. 특기만 말해.</p>
          <p>멀리 곽동헌이 성벽 위에서 쌍안경을 내리고 고개를 끄덕인다.</p>

          { text: "김승욱을 따라 급양소에서 몸부터 추스른다.", next: "kitchen" },
          { text: "곽동헌이 있는 관측대로 올라가 밖 풍경을 본다.", next: "watchtower" },
          { text: "문종범과 이야기하며 거점 규칙을 듣는다.", next: "records" },

      medic_tent: {
        html: `
          <p>의무 텐트 안은 소독약 냄새로 가득하다. 김주연이 손전등으로 눈동자를 비춘다.</p>
          <p><span class="speaker">김주연</span> 반응은 정상 쪽이에요. 다만… 혈액 검사에서 이상 수치가 하나 있었어요. 감염은 아니에요. 스트레스성이에요. 그런데 이름이 김한결이죠? 혹시 최근에 누굴… 오래 붙잡고 있었어요?</p>
          <p><span class="speaker">김한결</span> 기억이… 안 나.</p>
          <p>텐트 구석에서 류영재가 노트를 들고 중얼거린다.</p>
          <p><span class="speaker">류영재 (감염 연구)</span> 흥미롭군. 뇌파는 ‘깨어남 직후 공포’ 패턴이야. 도시 쪽에서 뭔가를 본 거겠지.</p>
        `,
        choices: [
          { text: "류영재에게 더 묻는다. 도시에 뭐가 있는지.", next: "research" },
          { text: "김주연을 믿고 휴식을 취한 뒤 저녁 회의에 참석한다.", next: "evening_meeting" },
        ],
      },
      radio: {
        html: `
          <p>통신소는 좁고 전선이 벽을 타고 간다. 장현성이 헤드셋을 벗고 한결을 본다.</p>
          <p><span class="speaker">장현성 (통신·전자)</span> 왔어? 북쪽 릴레이에서 ‘인간’ 코드가 잡혔어. 근데 패턴이 이상해. 구조대가 아니라… 누군가 장난치는 것 같기도 하고.</p>
          <p><span class="speaker">이승필 (전력)</span> 배터리는 30퍼 남았어. 태양판 쪽은 내가 지켜야 해서 오래 못 붙잡아.</p>
          <p>무전기에서 잡음 사이로 목소리가 스친다. “…구조… 아니… 오지 마…”</p>
        `,
        choices: [
          { text: "장현성·이승필과 함께 신호를 추적하는 야간 임무에 나선다.", next: "night_signal" },
          { text: "위험해 보이니 홍성두에게 보고하고 대기한다.", next: "evening_meeting" },
        ],
      },
      fence: {
        html: `
          <p>동쪽 펜스 앞은 숨이 막힌다. 박승호가 철조망을 두드리며 숫자를 센다.</p>
          <p><span class="speaker">박승호</span> 서른… 마흔… 씨, 오늘은 많네.</p>
          <p>맹주훈이 지게차로 콘크리트 블록을 밀어 넣는다.</p>
          <p><span class="speaker">맹주훈 (기계·차량)</span> 한결아? 물러서! 철판 튈 수 있어!</p>
          <p>펜스 너머, 회색 가죽 같은 피부의 무리가 밀려온다. 그중 하나가 한결을 ‘응시’하는 듯하다.</p>
        `,
        choices: [
          { text: "박승호 옆에서 모래주머니를 나른다. 방어에 힘을 보탠다.", next: "defense_path" },
          { text: "겁이 나 뒤로 물러나 최현준을 찾는다. “탈출 루트가 있어?”", next: "scout_escape" },
        ],
      },
      command: {
        html: `
          <p>지휘소 겸 회의실은 지도가 빼곡하다. 변해성이 색깔 핀으로 루트를 짚는다.</p>
          <p><span class="speaker">변해성 (보급·지도)</span> 북쪽은 위험도 빨강. 그래도 구호물자 창고가 하나 남아 있다는 첩보가 있어.</p>
          <p><span class="speaker">홍성두</span> 한결, 네가 깨어난 건 타이밍이야. 오늘 밤 ‘소규모 수색’을 할 거다. 네 체력이 버티면 같이 가라.</p>
          <p><span class="speaker">최현준 (정찰)</span> 제가 앞장설게요. 다만… 손수민 씨 말대로라면 지하 통로가 열려 있을 수도 있어요.</p>
        `,
        choices: [
          { text: "최현준의 지상 루트 수색에 참여한다.", next: "patrol_surface" },
          { text: "손수민과 지하 통로를 먼저 정찰한다.", next: "underground" },
        ],
      },
      kitchen: {
        html: `
          <p>급양소는 연기와 국 냄새로 따뜻하다. 김승민이 쟁반을 나른다.</p>
          <p><span class="speaker">김승민 (조리 보조·잡일)</span> 형, 여기 미역국. 승욱 삼촌이 “한국인은…” 이러던데, 나는 그냥 라면 물 아껴달라고요.</p>
          <p><span class="speaker">박수민 (아동·교육)</span> 어린이들 목소리 작게! 밖에 들려요!</p>
          <p>양인열이 구석에서 조용히 기도를 올리다 한결에게 고개를 숙인다.</p>
          <p><span class="speaker">양인열 (사목·심리)</span> 살아계시니 다행입니다. ‘왜 살아남았는지’는 천천히 찾으셔도 됩니다.</p>
        `,
        choices: [
          { text: "양인열과 잠시 이야기하며 마음을 다스린다.", next: "faith_calm" },
          { text: "박동현을 찾아가 “밖에서 사냥할 때 뭘 봤는지” 묻는다.", next: "hunter_info" },
        ],
      },
      watchtower: {
        html: `
          <p>관측대 위 바람이 차다. 곽동헌이 쌍안경을 건넨다.</p>
          <p><span class="speaker">곽동헌 (전 경찰·치안)</span> 저기, 북쪽 연기 기둥 보이지? 며칠 전부터 꺼지질 않아. 누군가 대규모로 태운 거야.</p>
          <p>도시 쪽, 고층 빌딩 사이로 무언가 움직인다. 사람처럼 보였다가 곧장 무리로 흩어진다.</p>
          <p><span class="speaker">곽동헌</span> …한결 씨, 네가 발견됐을 때 손에 쥐어져 있던 건 기억나? 작은 라디오였어. 주파수가 이 거점이랑 맞닿아 있더군.</p>
        `,
        choices: [
          { text: "“라디오…?” 장현성에게 바로 가서 주파수를 맞춰본다.", next: "radio" },

      },
      records: {
        html: `
          <p>문종범의 기록실은 종이 냄새가 난다.</p>
          <p><span class="speaker">문종범</span> 이 거점엔 사람이 많아. 최정명 같은 ‘밖 상인’ 라인도 있고, 박동현 같은 사냥꾼도 있지.</p>
          <p><span class="speaker">문종범</span> 규칙은 간단해. 밤에 혼자 밖에 나가지 말 것. 무전 채널 바꾸지 말 것. 그리고… 누가 “구조 왔다”고 해도 함부로 문 열지 말 것.</p>
          <p>최정명이 창고 문을 두드린다. 얼굴 절반은 스카프에 가려져 있다.</p>
          <p><span class="speaker">최정명 (밖 세계 정보상)</span> 한결 씨? 소문 들었어. 네 이름이 어떤 ‘리스트’에 같이 올라 있다더군.</p>
        `,
        choices: [
          { text: "최정명을 따라 조용히 밖 정보를 듣는다.", next: "trader_secret" },
          { text: "의심스럽다. 홍성두에게 최정명 이야기를 넘긴다.", next: "report_trader" },
        ],
      },
      research: {
        html: `
          <p><span class="speaker">류영재</span> 도시 중심부에 ‘군집’이 생겼어. 단순히 많은 게 아니라… 움직임이 맞춰져. 마치 한 몸처럼.</p>
          <p><span class="speaker">김주연</span> (낮게) 너무 무섭게 말하지 마요. 환자한테.</p>
          <p><span class="speaker">류영재</span> 미안. 하지만 사실이야. 그래서 우리는 ‘소음’을 최소화하는 게 생존이고.</p>
        `,
        choices: [
          { text: "저녁 회의에서 류영재의 보고를 직접 듣자고 한다.", next: "evening_meeting" },
          { text: "맹주훈에게 차량으로 철수 가능성을 묻는다.", next: "vehicle_talk" },

      },
      evening_meeting: {
        html: `

          <p>물자는 확보됐지만, 조교수는 그 자리에 남는다. 손수민의 눈이 차갑게 흔들린다.</p>
          <p>돌아온 뒤 손수민은 한결을 피한다. 최현준만이 낮게 말한다. “책임은 공동이야. 네가 혼자 지울 거 없어.”</p>
          <p>그래도 거점은 하루를 버틴다. 변해성이 물자를 나누고, 이승필이 전등을 하나 더 끈다.</p>
          <p><span class="speaker">김한결 (독백)</span> 살아남는 게… 항상 옳은 건 아니구나.</p>

      },
      end_sacrifice_hint: {
        ending: "스위치를 당긴 밤",
        endingClass: "good",

    function render(sceneId) {
      const scene = scenes[sceneId];
      if (!scene) {
        storyEl.innerHTML = "<p>씬을 찾을 수 없습니다.</p>";
        choicesEl.innerHTML = "";
        return;
      }
      let html = scene.html;
      if (scene.ending) {
        html += `<p><span class="ending-tag ${scene.endingClass || ""}">엔딩: ${scene.ending}</span></p>`;
        html += `<button type="button" class="restart" id="restartBtn">처음부터 다시</button>`;
      }
      storyEl.innerHTML = html;
      choicesEl.innerHTML = "";
      if (scene.choices && scene.choices.length) {
        scene.choices.forEach((c) => {
          const btn = document.createElement("button");
          btn.type = "button";
          btn.className = "choice";
          btn.textContent = c.text;
          btn.addEventListener("click", () => render(c.next));
          choicesEl.appendChild(btn);
        });
      }
      const restart = document.getElementById("restartBtn");
      if (restart) {
        restart.addEventListener("click", () => render("start"));
      }
      storyEl.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    render("start");
  </script>
</body>
</html>
