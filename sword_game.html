<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>용사의 모험 - 괴물 토벌</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family:'Noto Sans KR',sans-serif;
  background:#0a0a1a; color:#e0e0e0;
  min-height:100vh; overflow:hidden; user-select:none;
}
.bg {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 80%, rgba(59,130,246,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 20%, rgba(239,68,68,.06) 0%, transparent 50%);
}
.app { position:relative; z-index:1; max-width:520px; margin:0 auto; height:100vh; display:flex; flex-direction:column; padding:10px 12px; }

/* TOP BAR */
.top-bar { display:flex; justify-content:space-between; align-items:center; padding:8px 14px; background:rgba(255,255,255,.04); border-radius:12px; margin-bottom:8px; border:1px solid rgba(255,255,255,.06); }
.hero-info { display:flex; align-items:center; gap:10px; }
.hero-icon { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,#3b82f6,#8b5cf6); display:flex; align-items:center; justify-content:center; font-size:1.3rem; box-shadow:0 0 12px rgba(59,130,246,.3); }
.hero-name { font-weight:900; font-size:.95rem; }
.hero-lv { font-size:.7rem; color:#93c5fd; }
.gold-box { text-align:right; }
.gold-box .lbl { font-size:.65rem; color:#aaa; }
.gold-val { font-size:1rem; font-weight:900; color:#fbbf24; }

/* XP BAR */
.xp-bar-outer { height:6px; background:rgba(255,255,255,.06); border-radius:3px; margin-bottom:8px; overflow:hidden; }
.xp-bar-fill { height:100%; background:linear-gradient(90deg,#3b82f6,#8b5cf6); border-radius:3px; transition:width .3s; width:0%; }

/* STATS ROW */
.stats-row { display:flex; gap:6px; margin-bottom:8px; flex-wrap:wrap; }
.stat-chip { flex:1; min-width:70px; background:rgba(255,255,255,.04); border-radius:8px; padding:5px 8px; text-align:center; border:1px solid rgba(255,255,255,.06); }
.stat-chip .label { font-size:.55rem; color:#888; }
.stat-chip .val { font-size:.85rem; font-weight:700; }
.stat-chip .val.atk { color:#f87171; }
.stat-chip .val.def { color:#60a5fa; }
.stat-chip .val.hp { color:#4ade80; }
.stat-chip .val.crit { color:#fbbf24; }

/* TABS */
.tabs { display:flex; gap:4px; margin-bottom:8px; }
.tab-btn { flex:1; padding:8px; border:none; border-radius:8px; background:rgba(255,255,255,.05); color:#888; font-weight:700; font-size:.8rem; cursor:pointer; transition:.2s; font-family:inherit; }
.tab-btn.active { background:linear-gradient(135deg,#3b82f6,#8b5cf6); color:white; box-shadow:0 4px 15px rgba(59,130,246,.3); }

/* PANELS */
.panel { display:none; flex:1; flex-direction:column; min-height:0; overflow-y:auto; }
.panel.active { display:flex; }

/* BATTLE */
.battle-area { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; position:relative; }
.zone-label { font-size:.7rem; color:#888; letter-spacing:3px; margin-bottom:4px; }
.monster-canvas-wrap { position:relative; margin-bottom:8px; }
.monster-canvas-wrap canvas { border-radius:14px; border:2px solid rgba(255,255,255,.1); box-shadow:0 8px 30px rgba(0,0,0,.4); display:block; }
.monster-name { font-size:1.1rem; font-weight:900; text-align:center; margin-bottom:2px; }
.hp-outer { width:260px; height:12px; background:#1a1a2e; border-radius:6px; overflow:hidden; margin-bottom:4px; border:1px solid rgba(255,255,255,.08); }
.hp-fill { height:100%; background:linear-gradient(90deg,#ef4444,#f97316); border-radius:6px; transition:width .15s; }
.hp-text { font-size:.7rem; color:#aaa; text-align:center; margin-bottom:8px; }
.reward-text { font-size:.7rem; color:#fbbf24; text-align:center; margin-bottom:10px; }
.btn-attack { width:100%; max-width:300px; padding:14px; border:none; border-radius:12px; background:linear-gradient(135deg,#dc2626,#ef4444); color:white; font-size:1rem; font-weight:900; cursor:pointer; font-family:inherit; box-shadow:0 4px 20px rgba(239,68,68,.4); transition:.15s; }
.btn-attack:active { transform:scale(.96); }
.dmg-float { position:absolute; pointer-events:none; font-weight:900; font-size:1.2rem; animation:floatUp .8s ease forwards; }
@keyframes floatUp { 0%{opacity:1;transform:translateY(0)} 100%{opacity:0;transform:translateY(-60px)} }
.slash-fx { position:absolute; font-size:2rem; pointer-events:none; animation:slashAnim .35s ease forwards; }
@keyframes slashAnim { 0%{transform:rotate(-30deg) scale(.5);opacity:1} 50%{transform:rotate(20deg) scale(1.3);opacity:1} 100%{transform:rotate(50deg) scale(.7);opacity:0} }

/* ZONE NAV */
.zone-nav { display:flex; gap:4px; margin-bottom:8px; flex-wrap:wrap; }
.zone-btn { padding:5px 10px; border:1px solid rgba(255,255,255,.1); border-radius:8px; background:rgba(255,255,255,.04); color:#aaa; font-size:.7rem; font-weight:700; cursor:pointer; font-family:inherit; transition:.2s; }
.zone-btn:disabled { opacity:.3; cursor:not-allowed; }
.zone-btn.active { background:rgba(59,130,246,.2); color:#60a5fa; border-color:rgba(59,130,246,.4); }

/* SHOP */
.shop-grid { display:flex; flex-direction:column; gap:6px; }
.shop-item { display:flex; align-items:center; gap:10px; padding:10px 12px; background:rgba(255,255,255,.04); border-radius:10px; border:1px solid rgba(255,255,255,.06); }
.shop-item canvas { border-radius:8px; flex-shrink:0; }
.shop-info { flex:1; }
.shop-info .name { font-weight:700; font-size:.85rem; }
.shop-info .desc { font-size:.65rem; color:#888; }
.shop-price { font-weight:900; color:#fbbf24; font-size:.85rem; white-space:nowrap; }
.btn-buy { padding:6px 12px; border:none; border-radius:8px; background:linear-gradient(135deg,#f59e0b,#f97316); color:white; font-weight:700; font-size:.7rem; cursor:pointer; font-family:inherit; }
.btn-buy:disabled { opacity:.3; cursor:not-allowed; }

/* SKILLS */
.skill-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.skill-card { padding:10px; background:rgba(255,255,255,.04); border-radius:10px; border:1px solid rgba(255,255,255,.06); text-align:center; }
.skill-card .icon { font-size:1.8rem; margin-bottom:4px; }
.skill-card .sname { font-weight:700; font-size:.8rem; margin-bottom:2px; }
.skill-card .sdesc { font-size:.6rem; color:#888; margin-bottom:6px; }
.btn-skill { padding:5px 10px; border:none; border-radius:6px; background:linear-gradient(135deg,#8b5cf6,#a78bfa); color:white; font-weight:700; font-size:.7rem; cursor:pointer; font-family:inherit; }
.btn-skill:disabled { opacity:.3; cursor:not-allowed; }

/* LOG */
.log-area { margin-top:8px; max-height:100px; overflow-y:auto; padding:6px; background:rgba(0,0,0,.2); border-radius:8px; font-size:.65rem; line-height:1.6; }
.log-kill { color:#4ade80; }
.log-gold { color:#fbbf24; }
.log-lvl { color:#c084fc; }
.log-dmg { color:#f87171; }
.log-info { color:#60a5fa; }
.log-shop { color:#fb923c; }
.log-crit { color:#fde047; }

/* SHAKE */
@keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
.shake { animation:shake .3s ease; }
</style>
</head>
<body>
<div class="bg"></div>
<div class="app">
  <div class="top-bar">
    <div class="hero-info">
      <div class="hero-icon">⚔️</div>
      <div>
        <div class="hero-name">용사</div>
        <div class="hero-lv" id="hero-lv">Lv.1</div>
      </div>
    </div>
    <div class="gold-box">
      <div class="lbl">골드</div>
      <div class="gold-val" id="gold-val">500</div>
    </div>
  </div>

  <div class="xp-bar-outer"><div class="xp-bar-fill" id="xp-bar"></div></div>

  <div class="stats-row">
    <div class="stat-chip"><div class="label">공격력</div><div class="val atk" id="s-atk">12</div></div>
    <div class="stat-chip"><div class="label">방어력</div><div class="val def" id="s-def">3</div></div>
    <div class="stat-chip"><div class="label">체력</div><div class="val hp" id="s-hp">100/100</div></div>
    <div class="stat-chip"><div class="label">치명타</div><div class="val crit" id="s-crit">5%</div></div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('battle')">⚔️ 전투</button>
    <button class="tab-btn" onclick="switchTab('shop')">🛒 상점</button>
    <button class="tab-btn" onclick="switchTab('skill')">✨ 스킬</button>
  </div>

  <!-- BATTLE -->
  <div class="panel active" id="panel-battle">
    <div class="zone-nav" id="zone-nav"></div>
    <div class="battle-area" id="battle-area">
      <div class="zone-label" id="zone-label">초원</div>
      <div class="monster-canvas-wrap" id="monster-wrap">
        <canvas id="monster-canvas" width="160" height="160"></canvas>
      </div>
      <div class="monster-name" id="m-name">슬라임</div>
      <div class="hp-outer"><div class="hp-fill" id="hp-fill"></div></div>
      <div class="hp-text" id="hp-text">50 / 50</div>
      <div class="reward-text" id="reward-text">보상: 30G · 15XP</div>
      <button class="btn-attack" id="btn-atk" onclick="doAttack()">⚔️ 공격!</button>
    </div>
    <div class="log-area" id="log"></div>
  </div>

  <!-- SHOP -->
  <div class="panel" id="panel-shop">
    <div class="shop-grid" id="shop-grid"></div>
  </div>

  <!-- SKILL -->
  <div class="panel" id="panel-skill">
    <div class="skill-grid" id="skill-grid"></div>
  </div>
</div>

<script>
/* ========== MONSTER DRAWING ========== */
function drawMonster(ctx, type, w, h) {
  ctx.clearRect(0, 0, w, h);
  const cx = w / 2, cy = h / 2;
  const d = { slime: drawSlime, goblin: drawGoblin, wolf: drawWolf, bat: drawBat,
    golem: drawGolem, minotaur: drawMinotaur, fireDemon: drawFireDemon,
    lavaGiant: drawLavaGiant, phoenix: drawPhoenix, lich: drawLich,
    dragon: drawDragon, abyssLord: drawAbyssLord, fallenAngel: drawFallenAngel,
    serpent: drawSerpent, god: drawGod, rat: drawRat, boar: drawBoar, treant: drawTreant };
  if (d[type]) d[type](ctx, cx, cy, w, h);
}

function drawRat(c, cx, cy) {
  c.fillStyle='#8B7355'; fillEllipse(c,cx,cy+10,35,22);
  c.fillStyle='#7A6548'; fillEllipse(c,cx-12,cy-8,14,14);
  c.fillStyle='#6B5B3E'; fillEllipse(c,cx-8,cy-18,10,10);
  fillEllipse(c,cx-16,cy-18,10,10);
  c.fillStyle='#111'; fillCircle(c,cx-15,cy-10,2.5); fillCircle(c,cx-9,cy-10,2.5);
  c.fillStyle='pink'; fillCircle(c,cx-11,cy-6,2);
  c.strokeStyle='#8B7355'; c.lineWidth=2;
  c.beginPath(); c.moveTo(cx+22,cy+15); c.quadraticCurveTo(cx+45,cy-5,cx+35,cy-15); c.stroke();
}

function drawSlime(c, cx, cy) {
  const g = c.createRadialGradient(cx,cy+10,5,cx,cy+10,50);
  g.addColorStop(0,'#6ee7b7'); g.addColorStop(1,'#059669');
  c.fillStyle=g;
  c.beginPath(); c.moveTo(cx-40,cy+30);
  c.quadraticCurveTo(cx-45,cy-25,cx,cy-30);
  c.quadraticCurveTo(cx+45,cy-25,cx+40,cy+30);
  c.quadraticCurveTo(cx,cy+35,cx-40,cy+30);
  c.fill();
  c.fillStyle='#fff'; fillEllipse(c,cx-12,cy-5,8,10); fillEllipse(c,cx+12,cy-5,8,10);
  c.fillStyle='#111'; fillCircle(c,cx-10,cy-3,4); fillCircle(c,cx+14,cy-3,4);
  c.fillStyle='rgba(255,255,255,.3)'; fillEllipse(c,cx-15,cy-18,12,8);
}

function drawBoar(c, cx, cy) {
  c.fillStyle='#6B4423'; fillEllipse(c,cx,cy+5,45,30);
  c.fillStyle='#5A3A1E'; fillEllipse(c,cx-25,cy-10,20,18);
  c.fillStyle='#4A2E15'; fillEllipse(c,cx-22,cy-22,8,8); fillEllipse(c,cx-32,cy-22,8,8);
  c.fillStyle='#111'; fillCircle(c,cx-29,cy-12,3); fillCircle(c,cx-21,cy-12,3);
  c.fillStyle='#ddd'; c.beginPath(); c.moveTo(cx-30,cy-2); c.lineTo(cx-36,cy-10); c.lineTo(cx-33,cy-2); c.fill();
  c.beginPath(); c.moveTo(cx-22,cy-2); c.lineTo(cx-18,cy-10); c.lineTo(cx-20,cy-2); c.fill();
  c.fillStyle='#4A2E15';
  fillEllipse(c,cx-35,cy+25,8,10); fillEllipse(c,cx-15,cy+25,8,10);
  fillEllipse(c,cx+15,cy+25,8,10); fillEllipse(c,cx+35,cy+25,8,10);
}

function drawGoblin(c, cx, cy) {
  c.fillStyle='#4a7c3f'; fillEllipse(c,cx,cy+15,28,22);
  c.fillStyle='#3d6b34'; fillCircle(c,cx,cy-10,22);
  c.fillStyle='#2d5426';
  c.beginPath(); c.moveTo(cx-22,cy-18); c.lineTo(cx-35,cy-40); c.lineTo(cx-10,cy-22); c.fill();
  c.beginPath(); c.moveTo(cx+22,cy-18); c.lineTo(cx+35,cy-40); c.lineTo(cx+10,cy-22); c.fill();
  c.fillStyle='#ff4444'; fillEllipse(c,cx-8,cy-14,5,6); fillEllipse(c,cx+8,cy-14,5,6);
  c.fillStyle='#111'; fillCircle(c,cx-8,cy-13,3); fillCircle(c,cx+8,cy-13,3);
  c.fillStyle='#2d2d2d';
  c.beginPath(); c.moveTo(cx-10,cy); c.quadraticCurveTo(cx,cy+8,cx+10,cy); c.fill();
  c.fillStyle='#fff';
  for(let i=-2;i<=2;i++) { c.beginPath(); c.moveTo(cx+i*4,cy); c.lineTo(cx+i*4-2,cy+5); c.lineTo(cx+i*4+2,cy+5); c.fill(); }
}

function drawWolf(c, cx, cy) {
  c.fillStyle='#555'; fillEllipse(c,cx+5,cy+10,42,25);
  c.fillStyle='#666'; fillEllipse(c,cx-22,cy-5,22,18);
  c.fillStyle='#444';
  c.beginPath(); c.moveTo(cx-18,cy-22); c.lineTo(cx-28,cy-42); c.lineTo(cx-35,cy-18); c.fill();
  c.beginPath(); c.moveTo(cx-8,cy-22); c.lineTo(cx-2,cy-42); c.lineTo(cx+5,cy-18); c.fill();
  c.fillStyle='#ffcc00'; fillEllipse(c,cx-28,cy-8,4,5); fillEllipse(c,cx-16,cy-8,4,5);
  c.fillStyle='#111'; fillCircle(c,cx-27,cy-7,2.5); fillCircle(c,cx-15,cy-7,2.5);
  c.fillStyle='#333';
  c.beginPath(); c.moveTo(cx-35,cy+2); c.lineTo(cx-42,cy-2); c.lineTo(cx-38,cy+5); c.fill();
  c.strokeStyle='#555'; c.lineWidth=3;
  c.beginPath(); c.moveTo(cx+30,cy+10); c.quadraticCurveTo(cx+55,cy-10,cx+50,cy-20); c.stroke();
}

function drawBat(c, cx, cy) {
  c.fillStyle='#2a1a3a'; fillEllipse(c,cx,cy,18,15);
  c.fillStyle='#3d2556';
  c.beginPath(); c.moveTo(cx-10,cy-5); c.quadraticCurveTo(cx-55,cy-45,cx-50,cy+5);
  c.quadraticCurveTo(cx-40,cy-5,cx-30,cy+10); c.quadraticCurveTo(cx-20,cy-5,cx-10,cy+5); c.fill();
  c.beginPath(); c.moveTo(cx+10,cy-5); c.quadraticCurveTo(cx+55,cy-45,cx+50,cy+5);
  c.quadraticCurveTo(cx+40,cy-5,cx+30,cy+10); c.quadraticCurveTo(cx+20,cy-5,cx+10,cy+5); c.fill();
  c.fillStyle='#ff3366'; fillEllipse(c,cx-6,cy-5,3,4); fillEllipse(c,cx+6,cy-5,3,4);
  c.fillStyle='#fff';
  c.beginPath(); c.moveTo(cx-3,cy+5); c.lineTo(cx-1,cy+12); c.lineTo(cx+1,cy+12); c.lineTo(cx+3,cy+5); c.fill();
}

function drawGolem(c, cx, cy) {
  const g=c.createLinearGradient(cx-30,cy-40,cx+30,cy+40);
  g.addColorStop(0,'#8B8682'); g.addColorStop(1,'#5C5855');
  c.fillStyle=g;
  c.beginPath(); c.moveTo(cx-30,cy+35); c.lineTo(cx-35,cy-10); c.lineTo(cx-20,cy-35);
  c.lineTo(cx+20,cy-35); c.lineTo(cx+35,cy-10); c.lineTo(cx+30,cy+35); c.closePath(); c.fill();
  c.fillStyle='#00ccff'; fillEllipse(c,cx-12,cy-12,6,5); fillEllipse(c,cx+12,cy-12,6,5);
  c.fillStyle='rgba(0,204,255,.3)';
  c.beginPath(); c.moveTo(cx-5,cy+5); c.lineTo(cx,cy+15); c.lineTo(cx+5,cy+5); c.closePath(); c.fill();
  c.strokeStyle='#4a4a4a'; c.lineWidth=1.5;
  for(let i=0;i<4;i++){ c.beginPath(); c.moveTo(cx-25+i*15,cy-20+i*5); c.lineTo(cx-15+i*12,cy-10+i*8); c.stroke(); }
}

function drawMinotaur(c, cx, cy) {
  c.fillStyle='#8B4513'; fillEllipse(c,cx,cy+10,35,30);
  c.fillStyle='#A0522D'; fillCircle(c,cx,cy-18,24);
  c.fillStyle='#DAA520';
  c.beginPath(); c.moveTo(cx-20,cy-30); c.quadraticCurveTo(cx-35,cy-60,cx-15,cy-55); c.lineTo(cx-15,cy-35); c.fill();
  c.beginPath(); c.moveTo(cx+20,cy-30); c.quadraticCurveTo(cx+35,cy-60,cx+15,cy-55); c.lineTo(cx+15,cy-35); c.fill();
  c.fillStyle='#ff2222'; fillEllipse(c,cx-8,cy-22,4,5); fillEllipse(c,cx+8,cy-22,4,5);
  c.fillStyle='#111'; fillCircle(c,cx-8,cy-21,2.5); fillCircle(c,cx+8,cy-21,2.5);
  c.fillStyle='#6B3410'; fillCircle(c,cx,cy-10,5);
  c.fillStyle='#5a3000'; fillEllipse(c,cx-20,cy+32,10,12); fillEllipse(c,cx+20,cy+32,10,12);
}

function drawFireDemon(c, cx, cy) {
  const g=c.createRadialGradient(cx,cy+5,5,cx,cy,55);
  g.addColorStop(0,'#ff4500'); g.addColorStop(.6,'#cc0000'); g.addColorStop(1,'#440000');
  c.fillStyle=g; fillEllipse(c,cx,cy+5,38,35);
  c.fillStyle='#ff6600';
  for(let i=0;i<5;i++){
    const a=-Math.PI/2+i*Math.PI/4-Math.PI/2;
    const fx=cx+Math.cos(a)*25, fy=cy+Math.sin(a)*20-10;
    drawFlame(c,fx,fy,8+Math.random()*6);
  }
  c.fillStyle='#ffcc00'; fillEllipse(c,cx-10,cy-8,5,7); fillEllipse(c,cx+10,cy-8,5,7);
  c.fillStyle='#000'; fillCircle(c,cx-10,cy-7,3); fillCircle(c,cx+10,cy-7,3);
  c.fillStyle='#ff8800';
  c.beginPath(); c.moveTo(cx-12,cy+10); c.quadraticCurveTo(cx,cy+20,cx+12,cy+10); c.fill();
}

function drawLavaGiant(c, cx, cy) {
  const g=c.createLinearGradient(cx,cy-45,cx,cy+45);
  g.addColorStop(0,'#ff4400'); g.addColorStop(.5,'#881100'); g.addColorStop(1,'#330000');
  c.fillStyle=g;
  c.beginPath(); c.moveTo(cx-35,cy+40); c.lineTo(cx-40,cy-5); c.lineTo(cx-25,cy-40);
  c.lineTo(cx+25,cy-40); c.lineTo(cx+40,cy-5); c.lineTo(cx+35,cy+40); c.closePath(); c.fill();
  c.fillStyle='#ff6600';
  for(let i=0;i<6;i++){
    const x=cx-20+Math.random()*40, y=cy-20+Math.random()*50;
    fillCircle(c,x,y,2+Math.random()*4);
  }
  c.fillStyle='#ffaa00'; fillEllipse(c,cx-12,cy-15,6,5); fillEllipse(c,cx+12,cy-15,6,5);
  drawFlame(c,cx-20,cy-42,12); drawFlame(c,cx,cy-48,14); drawFlame(c,cx+20,cy-42,12);
}

function drawPhoenix(c, cx, cy) {
  c.fillStyle='#ff4400'; fillEllipse(c,cx,cy,22,18);
  c.fillStyle='#ff6600';
  c.beginPath(); c.moveTo(cx-15,cy-5); c.quadraticCurveTo(cx-60,cy-30,cx-55,cy+15);
  c.quadraticCurveTo(cx-35,cy+5,cx-15,cy+10); c.fill();
  c.beginPath(); c.moveTo(cx+15,cy-5); c.quadraticCurveTo(cx+60,cy-30,cx+55,cy+15);
  c.quadraticCurveTo(cx+35,cy+5,cx+15,cy+10); c.fill();
  c.fillStyle='#ffcc00';
  drawFlame(c,cx-5,cy-25,10); drawFlame(c,cx+5,cy-30,12); drawFlame(c,cx,cy-22,8);
  c.fillStyle='#fff'; fillCircle(c,cx-7,cy-4,4); fillCircle(c,cx+7,cy-4,4);

function drawFlame(c, x, y, size) {
  c.beginPath();

  c.quadraticCurveTo(x, y + size * .1, x - size * .4, y + size * .3);
  c.quadraticCurveTo(x - size * .6, y - size * .3, x, y - size);
  c.fill();
}

/* ========== STATE ========== */
let hero = {
  lv: 1, xp: 0, gold: 500,
  baseAtk: 12, baseDef: 3, baseHp: 100, baseCrit: 5,
  bonusAtk: 0, bonusDef: 0, bonusCrit: 0, bonusHp: 0,
  hp: 100, kills: 0,
};
let curZone = 0;
let monster = null;
let mHp = 0;
let bought = {};
let skillCd = {};
let powerNext = false;
let berserkLeft = 0;

function totalAtk() { return hero.baseAtk + hero.bonusAtk + hero.lv * 3; }
function totalDef() { return hero.baseDef + hero.bonusDef + Math.floor(hero.lv * 1.5); }
function totalMaxHp() { return hero.baseHp + hero.bonusHp + hero.lv * 15; }
function totalCrit() { return Math.min(80, hero.baseCrit + hero.bonusCrit + Math.floor(hero.lv * 0.5)); }
function xpToNext() { return Math.floor(60 * Math.pow(1.25, hero.lv - 1)); }

/* ========== CORE ========== */
function spawnMonster() {
  const z = ZONES[curZone];
  const m = z.monsters[Math.floor(Math.random() * z.monsters.length)];
  monster = { ...m };
  mHp = m.hp;
  renderMonster();
  updateBattleUI();
}

function renderMonster() {
  const cv = document.getElementById('monster-canvas');
  const ctx = cv.getContext('2d');
  drawMonster(ctx, monster.type, cv.width, cv.height);
}

function doAttack() {
  if (!monster || mHp <= 0) return;

  let atk = totalAtk();
  if (berserkLeft > 0) { atk *= 2; berserkLeft--; if (berserkLeft === 0) addLog('광전사 효과 종료', 'log-info'); }
  const variance = Math.floor(atk * 0.15 * (Math.random() * 2 - 1));
  let dmg = Math.max(1, atk + variance);
  let isCrit = Math.random() * 100 < totalCrit();
  if (isCrit) dmg = Math.floor(dmg * 2.2);
  if (powerNext) { dmg *= 3; powerNext = false; addLog('파워 스트라이크 발동!', 'log-crit'); }

  mHp -= dmg;

  const wrap = document.getElementById('monster-wrap');
  wrap.classList.add('shake'); setTimeout(() => wrap.classList.remove('shake'), 300);
  floatDmg('-' + fmt(dmg), isCrit ? '#fde047' : '#f87171', isCrit);
  showSlash();

  if (mHp <= 0) {
    mHp = 0;
    hero.gold += monster.reward;
    hero.xp += monster.xp;
    hero.kills++;
    addLog(`${monster.name} 처치! +${fmt(monster.reward)}G +${monster.xp}XP`, 'log-kill');
    checkLevelUp();
    tickCooldowns();
    setTimeout(spawnMonster, 400);
  } else {
    const mDmg = Math.max(1, monster.atk - totalDef() + Math.floor(Math.random() * 6));
    hero.hp -= mDmg;
    addLog(`${monster.name}의 반격! -${fmt(mDmg)} HP`, 'log-dmg');
    if (hero.hp <= 0) {
      hero.hp = 0;
      addLog('용사가 쓰러졌다... 마을에서 부활합니다.', 'log-dmg');
      setTimeout(() => {
        hero.hp = Math.floor(totalMaxHp() * 0.5);
        hero.gold = Math.max(0, hero.gold - Math.floor(hero.gold * 0.1));
        addLog('부활! (골드 10% 손실)', 'log-info');
        spawnMonster();
        updateAll();
      }, 800);
    }
    tickCooldowns();
  }
  updateAll();
}

function checkLevelUp() {
  const need = xpToNext();
  while (hero.xp >= need && hero.lv < 40) {
    hero.xp -= xpToNext();
    hero.lv++;
    hero.hp = totalMaxHp();
    addLog(`레벨 UP! Lv.${hero.lv} 달성!`, 'log-lvl');
  }
}

function tickCooldowns() {
  for (const k in skillCd) { if (skillCd[k] > 0) skillCd[k]--; }
}

function useSkill(id) {
  if (skillCd[id] > 0) return;
  const sk = SKILLS.find(s => s.id === id);
  if (!sk || hero.lv < sk.reqLv) return;
  skillCd[id] = sk.cooldown;

  if (id === 'powerstrike') { powerNext = true; addLog('파워 스트라이크 준비!', 'log-crit'); }
  else if (id === 'heal') {
    const amt = Math.floor(totalMaxHp() * 0.3);
    hero.hp = Math.min(totalMaxHp(), hero.hp + amt);
    addLog(`치유! +${fmt(amt)} HP`, 'log-info');
  }
  else if (id === 'berserk') { berserkLeft = 5; addLog('광전사 모드! 5회 공격력 2배!', 'log-crit'); }
  else if (id === 'execute') {
    if (monster && mHp > 0 && mHp / monster.hp <= 0.2) {
      mHp = 0;
      hero.gold += monster.reward;
      hero.xp += monster.xp;
      hero.kills++;
      addLog(`처형! ${monster.name} 즉사! +${fmt(monster.reward)}G`, 'log-kill');
      checkLevelUp();
      setTimeout(spawnMonster, 400);
    } else {
      addLog('처형 실패: 적 HP가 20% 이하일 때만 가능', 'log-dmg');
      skillCd[id] = 0;
    }
  }
  updateAll();
}

function buyItem(id) {
  const item = SHOP_ITEMS.find(i => i.id === id);
  if (!item || hero.gold < item.price) return;
  if (!item.reusable && bought[id]) return;
  hero.gold -= item.price;
  if (item.stat === 'atk') hero.bonusAtk += item.val;
  else if (item.stat === 'def') hero.bonusDef += item.val;
  else if (item.stat === 'crit') hero.bonusCrit += item.val;
  else if (item.stat === 'maxhp') { hero.bonusHp += item.val; hero.hp = Math.min(hero.hp + item.val, totalMaxHp()); }
  else if (item.stat === 'heal') { hero.hp = totalMaxHp(); }
  if (!item.reusable) bought[id] = true;
  addLog(`${item.name} 구매!`, 'log-shop');
  updateAll();
}

/* ========== UI ========== */
function fmt(n) { return n.toLocaleString(); }

function updateAll() {
  document.getElementById('hero-lv').textContent = 'Lv.' + hero.lv;
  document.getElementById('gold-val').textContent = fmt(hero.gold);
  document.getElementById('xp-bar').style.width = Math.min(100, (hero.xp / xpToNext()) * 100) + '%';
  document.getElementById('s-atk').textContent = fmt(totalAtk());
  document.getElementById('s-def').textContent = fmt(totalDef());
  document.getElementById('s-hp').textContent = fmt(hero.hp) + '/' + fmt(totalMaxHp());
  document.getElementById('s-crit').textContent = totalCrit() + '%';
  updateBattleUI();
  renderShop();
  renderSkills();
}

function updateBattleUI() {
  if (!monster) return;
  document.getElementById('zone-label').textContent = ZONES[curZone].name;
  document.getElementById('m-name').textContent = monster.name;
  document.getElementById('hp-fill').style.width = Math.max(0, (mHp / monster.hp) * 100) + '%';
  document.getElementById('hp-text').textContent = `${fmt(Math.max(0, mHp))} / ${fmt(monster.hp)}`;
  document.getElementById('reward-text').textContent = `보상: ${fmt(monster.reward)}G · ${monster.xp}XP`;
  buildZoneNav();
}

function buildZoneNav() {
  const nav = document.getElementById('zone-nav');
  nav.innerHTML = '';
  ZONES.forEach((z, i) => {
    const b = document.createElement('button');
    b.className = 'zone-btn' + (i === curZone ? ' active' : '');
    b.textContent = z.name;
    b.disabled = hero.lv < z.reqLv;
    if (hero.lv < z.reqLv) b.textContent += ` (Lv${z.reqLv})`;
    b.onclick = () => { if (hero.lv >= z.reqLv) { curZone = i; spawnMonster(); } };
    nav.appendChild(b);
  });
}

function renderShop() {
  const grid = document.getElementById('shop-grid');
  grid.innerHTML = '';
  SHOP_ITEMS.forEach(item => {
    const owned = !item.reusable && bought[item.id];
    const div = document.createElement('div');
    div.className = 'shop-item';
    div.innerHTML = `
      <div style="font-size:1.8rem">${item.icon}</div>
      <div class="shop-info">
        <div class="name">${item.name} ${owned ? '<span style="color:#4ade80">(보유)</span>' : ''}</div>
        <div class="desc">${item.desc}</div>
      </div>
      <div style="text-align:right">
        <div class="shop-price">${fmt(item.price)}G</div>
        <button class="btn-buy" ${owned || hero.gold < item.price ? 'disabled' : ''} onclick="buyItem('${item.id}')">${owned ? '보유중' : '구매'}</button>
      </div>`;
    grid.appendChild(div);
  });
}

function renderSkills() {
  const grid = document.getElementById('skill-grid');
  grid.innerHTML = '';
  SKILLS.forEach(sk => {
    const locked = hero.lv < sk.reqLv;
    const cd = skillCd[sk.id] || 0;
    const div = document.createElement('div');
    div.className = 'skill-card';
    div.innerHTML = `
      <div class="icon">${sk.icon}</div>
      <div class="sname">${sk.name}</div>
      <div class="sdesc">${locked ? `Lv.${sk.reqLv} 해금` : sk.desc}</div>
      <button class="btn-skill" ${locked || cd > 0 ? 'disabled' : ''} onclick="useSkill('${sk.id}')">
        ${locked ? '잠김' : cd > 0 ? `쿨다운 ${cd}` : '사용'}
      </button>`;
    grid.appendChild(div);
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (name==='battle'&&i===0)||(name==='shop'&&i===1)||(name==='skill'&&i===2));
  });
  ['battle','shop','skill'].forEach(t => {
    document.getElementById('panel-'+t).classList.toggle('active', t===name);
  });
  if (name === 'battle' && !monster) spawnMonster();
  if (name === 'shop') renderShop();
  if (name === 'skill') renderSkills();
}

function addLog(msg, cls) {
  const log = document.getElementById('log');
  const d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  log.prepend(d);
  if (log.children.length > 100) log.removeChild(log.lastChild);
}

function floatDmg(text, color, big) {
  const area = document.getElementById('battle-area');
  const d = document.createElement('div');
  d.className = 'dmg-float';
  d.textContent = text;
  d.style.color = color;
  d.style.fontSize = big ? '1.6rem' : '1.1rem';
  d.style.left = (40 + Math.random() * 20) + '%';
  d.style.top = (15 + Math.random() * 15) + '%';
  area.appendChild(d);
  setTimeout(() => d.remove(), 800);
}

function showSlash() {
  const area = document.getElementById('battle-area');
  const s = document.createElement('div');
  s.className = 'slash-fx';
  s.textContent = '💥';
  s.style.left = '50%'; s.style.top = '18%';
  area.appendChild(s);
  setTimeout(() => s.remove(), 350);
}

/* ========== INIT ========== */
addLog('⚔️ 용사의 모험에 오신 것을 환영합니다!', 'log-info');
addLog('괴물을 처치하여 경험치와 골드를 모으세요.', 'log-info');
addLog('상점에서 장비를 구매하고, 스킬을 활용하세요!', 'log-info');
spawnMonster();
updateAll();
</script>
